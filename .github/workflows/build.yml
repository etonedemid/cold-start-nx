# ─── COLD START — CI/CD Pipeline ─────────────────────────────────────────────
# Builds for Linux, Windows, Nintendo Switch, Android, and a dedicated server.
# Creates a GitHub Release when a version tag is pushed or workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.0.1)"
        required: true
        type: string

permissions:
  contents: write

# ─── Jobs ────────────────────────────────────────────────────────────────────

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev \
            libenet-dev \
            libminiupnpc-dev

      - name: Configure
        run: cmake -B build-pc -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-pc -j$(nproc)

      - name: Package (dist bundle)
        run: cmake --build build-pc --target dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-linux
          path: build-pc/dist/

  # ── Linux Dedicated Server ─────────────────────────────────────────────────

  linux-server:
    name: Linux Dedicated Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libenet-dev \
            libminiupnpc-dev

      - name: Configure
        run: cmake -B build-server -DCMAKE_BUILD_TYPE=Release -DSERVER_ONLY=ON

      - name: Build
        run: cmake --build build-server -j$(nproc)

      - name: Package server bundle
        run: |
          mkdir -p server-dist
          cp build-server/cold_start server-dist/
          cp -r romfs server-dist/romfs
          cp -r deploy server-dist/deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-linux-server
          path: server-dist/

  # ── Windows (MSYS2 MinGW64) ───────────────────────────────────────────────

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-SDL2_mixer

      - name: Configure
        run: cmake -B build-win -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-win --parallel

      - name: Bundle MinGW DLLs
        run: |
          # Iterative worklist using objdump so we handle transitive deps
          # without shell-function recursion or pipefail issues.
          SYSTEM="KERNEL32 USER32 GDI32 ADVAPI32 SHELL32 WINMM IMM32 \
                  OLE32 OLEAUT32 RPCRT4 SETUPAPI VERSION USP10 WS2_32 \
                  DINPUT8 COMDLG32 SHLWAPI CFGMGR32 NTDLL MSVCRT \
                  BCRYPT VCRUNTIME MSVCP API-MS-WIN D3D"

          is_system() {
            upper=$(echo "$1" | tr '[:lower:]' '[:upper:]' | sed 's/\.DLL$//')
            for s in $SYSTEM; do
              case "$upper" in ${s}*) return 0 ;; esac
            done
            return 1
          }

          # Seed worklist with the exe
          worklist="build-win/cold_start.exe"
          while [ -n "$worklist" ]; do
            next_worklist=""
            for item in $worklist; do
              for dll in $(objdump -p "$item" 2>/dev/null | awk '/DLL Name:/{print $3}'); do
                if ! is_system "$dll"; then
                  src="/mingw64/bin/$dll"
                  dst="build-win/$dll"
                  if [ -f "$src" ] && [ ! -f "$dst" ]; then
                    cp "$src" "$dst"
                    echo "  Bundled $dll"
                    next_worklist="$next_worklist $dst"
                  fi
                fi
              done
            done
            worklist="$next_worklist"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-windows
          path: |
            build-win/cold_start.exe
            build-win/*.dll
            build-win/romfs/

  # ── Nintendo Switch ────────────────────────────────────────────────────────

  switch:
    name: Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 portlibs
        run: |
          dkp-pacman -S --noconfirm --needed \
            switch-sdl2 \
            switch-sdl2_image \
            switch-sdl2_ttf \
            switch-sdl2_mixer

      - name: Build
        run: make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-switch
          path: cold_start.nro

  # ── Android ────────────────────────────────────────────────────────────────

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
          validate-wrappers: false

      - name: Download SDL2 sources
        run: |
          cd android
          chmod +x setup_sdl.sh
          ./setup_sdl.sh

      - name: Build APK
        run: |
          cd android
          gradle assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-android
          path: android/app/build/outputs/apk/release/*.apk

  # ── GitHub Release ─────────────────────────────────────────────────────────

  release:
    name: Release
    needs: [linux, linux-server, windows, switch, android]
    runs-on: ubuntu-latest
    if: >-
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
      && needs.linux.result == 'success'
      && needs.linux-server.result == 'success'
      && needs.windows.result == 'success'
      && needs.switch.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if ! echo "$version" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error::Version '$version' does not match vX.Y.Z format"
              exit 1
            fi
            echo "tag=$version" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          VER="${{ steps.version.outputs.tag }}"

          # Linux
          cd artifacts/cold_start-linux
          chmod +x cold_start run.sh
          zip -r "../../cold_start-linux-${VER}.zip" .
          cd ../..

          # Linux server
          if [ -d "artifacts/cold_start-linux-server" ]; then
            cd artifacts/cold_start-linux-server
            chmod +x cold_start
            zip -r "../../cold_start-linux-server-${VER}.zip" .
            cd ../..
          fi

          # Windows
          cd artifacts/cold_start-windows
          zip -r "../../cold_start-windows-${VER}.zip" .
          cd ../..

          # Switch
          cp artifacts/cold_start-switch/cold_start.nro "cold-start-nx.nro"

          # Android
          if [ -d "artifacts/cold_start-android" ]; then
            cp artifacts/cold_start-android/*.apk "cold_start-android-${VER}.apk" 2>/dev/null || true
          fi

      - name: Extract changelog for this release
        id: changelog
        run: |
          VER="${{ steps.version.outputs.tag }}"
          # Strip leading 'v' to match README heading (e.g. v1.0.2 → 1.0.2)
          VER_NUM="${VER#v}"
          # Extract the section between this version heading and the next one
          body=$(awk "/^### v${VER_NUM}[[:space:]]/{found=1; next}
                      found && /^### v/{exit}
                      found{print}" README.md)
          if [ -z "$body" ]; then
            body="See [README.md](README.md#changelog) for the full changelog."
          fi
          # Write to a file to avoid shell quoting issues
          printf '%s\n' "$body" > release_notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          make_latest: true
          name: COLD START ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          fail_on_unmatched_files: false
          files: |
            cold_start-linux-${{ steps.version.outputs.tag }}.zip
            cold_start-linux-server-${{ steps.version.outputs.tag }}.zip
            cold_start-windows-${{ steps.version.outputs.tag }}.zip
            cold-start-nx.nro
            cold_start-android-${{ steps.version.outputs.tag }}.apk
