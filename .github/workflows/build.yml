name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  build-pc:
    name: PC (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev

      - name: Configure
        run: cmake -B build-pc -S .

      - name: Build
        run: cmake --build build-pc --parallel

      - name: Upload PC artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-pc
          path: build-pc/cold_start

  build-switch:
    name: Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Switch SDL2 portlibs
        run: dkp-pacman -S --noconfirm switch-sdl2 switch-sdl2_image switch-sdl2_ttf switch-sdl2_mixer

      - name: Build
        run: make -j$(nproc)

      - name: Rename .nro
        run: cp cold_start.nro cold-start-nx.nro

      - name: Upload Switch artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-switch
          path: cold-start-nx.nro

  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 via vcpkg
        run: |
          vcpkg install sdl2 sdl2-image sdl2-ttf sdl2-mixer enet --triplet x64-windows
          vcpkg integrate install

      - name: Configure
        run: >
          cmake -B build-windows -S .
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-windows --config Release --parallel

      - name: Collect artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "build-windows\Release\cold_start.exe") {
            New-Item -ItemType Directory -Force dist-windows | Out-Null
            Copy-Item "build-windows\Release\cold_start.exe" dist-windows\
            if (Test-Path "build-windows\Release\romfs") {
              Copy-Item -Recurse "build-windows\Release\romfs" dist-windows\romfs
            }
          }

      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-windows
          path: dist-windows\
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: [build-pc, build-windows, build-switch]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') && needs.build-pc.result == 'success' && needs.build-switch.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download PC artifact
        uses: actions/download-artifact@v4
        with:
          name: cold_start-pc
          path: release-assets/pc

      - name: Download Windows artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cold_start-windows
          path: release-assets/windows

      - name: Download Switch artifact
        uses: actions/download-artifact@v4
        with:
          name: cold_start-switch
          path: release-assets/switch

      - name: Package PC build
        run: |
          cd release-assets/pc
          chmod +x cold_start
          zip ../../cold_start-linux-${{ github.ref_name }}.zip cold_start

      - name: Package Windows build
        if: needs.build-windows.result == 'success'
        run: |
          cd release-assets/windows
          zip -r ../../cold_start-windows-${{ github.ref_name }}.zip .

      - name: Rename Switch build
        run: cp release-assets/switch/cold-start-nx.nro cold-start-nx.nro

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          name: COLD START ${{ github.ref_name }}
          body: |
            See [README.md](README.md#changelog) for the full changelog.
          fail_on_unmatched_files: false
          files: |
            cold_start-linux-${{ github.ref_name }}.zip
            cold_start-windows-${{ github.ref_name }}.zip
            cold-start-nx.nro