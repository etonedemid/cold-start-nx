# ─── COLD START — CI/CD Pipeline ─────────────────────────────────────────────
# Builds for Linux, Windows, Nintendo Switch, Android, and a dedicated server.
# Creates a GitHub Release when a version tag is pushed or workflow_dispatch.
# ─────────────────────────────────────────────────────────────────────────────

name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.9.9)"
        required: true
        type: string

permissions:
  contents: write

# ─── Jobs ────────────────────────────────────────────────────────────────────

jobs:

  # ── Linux ──────────────────────────────────────────────────────────────────

  linux:
    name: Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev \
            libenet-dev \
            libminiupnpc-dev

      - name: Configure
        run: cmake -B build-pc -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-pc -j$(nproc)

      - name: Package (dist bundle)
        run: cmake --build build-pc --target dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-linux
          path: build-pc/dist/

  # ── Linux Dedicated Server ─────────────────────────────────────────────────

  linux-server:
    name: Linux Dedicated Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libenet-dev \
            libminiupnpc-dev

      - name: Configure
        run: cmake -B build-server -DCMAKE_BUILD_TYPE=Release -DSERVER_ONLY=ON

      - name: Build
        run: cmake --build build-server -j$(nproc)

      - name: Package server bundle
        run: |
          mkdir -p server-dist
          cp build-server/cold_start server-dist/
          cp -r romfs server-dist/romfs
          cp -r deploy server-dist/deploy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-linux-server
          path: server-dist/

  # ── Windows (MSYS2 MinGW64) ───────────────────────────────────────────────

  windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-SDL2_mixer

      - name: Configure
        run: cmake -B build-win -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-win --parallel

      - name: Bundle MinGW DLLs
        run: |
          # Copy non-system DLLs that the exe depends on
          SYSTEM="KERNEL32 USER32 GDI32 ADVAPI32 SHELL32 WINMM IMM32 \
                  OLE32 OLEAUT32 RPCRT4 SETUPAPI VERSION USP10 WS2_32 \
                  DINPUT8 COMDLG32 SHLWAPI CFGMGR32 NTDLL MSVCRT \
                  API-MS-WIN D3D BCRYPT"
          for dll in $(objdump -p build-win/cold_start.exe | awk '/DLL Name:/{print $3}'); do
            upper=$(echo "$dll" | tr '[:lower:]' '[:upper:]')
            needed=true
            for sys in $SYSTEM; do
              if echo "$upper" | grep -q "^$sys"; then needed=false; break; fi
            done
            if $needed; then
              src="/mingw64/bin/$dll"
              if [ -f "$src" ]; then
                cp "$src" build-win/
                echo "  Bundled $dll"
              fi
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-windows
          path: |
            build-win/cold_start.exe
            build-win/*.dll
            build-win/romfs/

  # ── Nintendo Switch ────────────────────────────────────────────────────────

  switch:
    name: Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SDL2 portlibs
        run: |
          dkp-pacman -S --noconfirm --needed \
            switch-sdl2 \
            switch-sdl2_image \
            switch-sdl2_ttf \
            switch-sdl2_mixer

      - name: Build
        run: make -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-switch
          path: cold_start.nro

  # ── Android ────────────────────────────────────────────────────────────────

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10"
          validate-wrappers: false

      - name: Download SDL2 sources
        run: |
          cd android
          chmod +x setup_sdl.sh
          ./setup_sdl.sh

      - name: Build APK
        run: |
          cd android
          gradle assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-android
          path: android/app/build/outputs/apk/release/*.apk

  # ── GitHub Release ─────────────────────────────────────────────────────────

  release:
    name: Release
    needs: [linux, linux-server, windows, switch, android]
    runs-on: ubuntu-latest
    if: >-
      (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
      && needs.linux.result == 'success'
      && needs.linux-server.result == 'success'
      && needs.switch.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if ! echo "$version" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "::error::Version '$version' does not match vX.Y.Z format"
              exit 1
            fi
            echo "tag=$version" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          VER="${{ steps.version.outputs.tag }}"

          # Linux
          cd artifacts/cold_start-linux
          chmod +x cold_start run.sh
          zip -r "../../cold_start-linux-${VER}.zip" .
          cd ../..

          # Linux server
          if [ -d "artifacts/cold_start-linux-server" ]; then
            cd artifacts/cold_start-linux-server
            chmod +x cold_start
            zip -r "../../cold_start-linux-server-${VER}.zip" .
            cd ../..
          fi

          # Windows
          if [ -d "artifacts/cold_start-windows" ]; then
            cd artifacts/cold_start-windows
            zip -r "../../cold_start-windows-${VER}.zip" .
            cd ../..
          fi

          # Switch
          cp artifacts/cold_start-switch/cold_start.nro "cold-start-nx.nro"

          # Android
          if [ -d "artifacts/cold_start-android" ]; then
            cp artifacts/cold_start-android/*.apk "cold_start-android-${VER}.apk" 2>/dev/null || true
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          make_latest: true
          name: COLD START ${{ steps.version.outputs.tag }}
          body: |
            See [README.md](README.md#changelog) for the full changelog.
          fail_on_unmatched_files: false
          files: |
            cold_start-linux-${{ steps.version.outputs.tag }}.zip
            cold_start-linux-server-${{ steps.version.outputs.tag }}.zip
            cold_start-windows-${{ steps.version.outputs.tag }}.zip
            cold-start-nx.nro
            cold_start-android-${{ steps.version.outputs.tag }}.apk
