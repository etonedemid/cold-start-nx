name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v0.7.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-pc:
    name: PC (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libsdl2-mixer-dev

      - name: Configure
        run: cmake -B build-pc -S .

      - name: Build
        run: cmake --build build-pc --parallel

      - name: Upload PC artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-pc
          path: build-pc/cold_start

  build-switch:
    name: Nintendo Switch
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Switch SDL2 portlibs
        run: dkp-pacman -S --noconfirm switch-sdl2 switch-sdl2_image switch-sdl2_ttf switch-sdl2_mixer

      - name: Build
        run: make -j$(nproc)

      - name: Upload Switch artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-switch
          path: cold-start-nx.nro

  build-windows:
    name: Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2 MinGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-SDL2_mixer

      - name: Configure
        run: |
          cmake -B build-windows -S . \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-windows --parallel

      - name: Bundle required MinGW DLLs
        run: |
          # Copy any non-system DLL that the exe depends on from the MinGW bin dir.
          # System DLLs (kernel32, user32, etc.) are present on every Windows install.
          SYSTEM="KERNEL32 USER32 GDI32 ADVAPI32 SHELL32 WINMM IMMI32 IMM32 \
                  OLE32 OLEAUT32 RPCRT4 SETUPAPI VERSION USP10 WS2_32 DINPUT8 \
                  COMDLG32 SHLWAPI CFGMGR32 NTDLL MSVCRT API-MS-WIN D3D"
          for dll in $(objdump -p build-windows/cold_start.exe | awk '/DLL Name:/{print $3}'); do
            upper=$(echo "$dll" | tr '[:lower:]' '[:upper:]')
            needed=true
            for sys in $SYSTEM; do
              if echo "$upper" | grep -q "^$sys"; then needed=false; break; fi
            done
            if $needed; then
              src="/mingw64/bin/$dll"
              if [ -f "$src" ]; then
                cp "$src" build-windows/
                echo "Bundled $dll"
              fi
            fi
          done

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cold_start-windows
          path: |
            build-windows/cold_start.exe
            build-windows/*.dll
            build-windows/romfs/

  release:
    name: GitHub Release
    needs: [build-pc, build-windows, build-switch]
    runs-on: ubuntu-latest
    if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && needs.build-pc.result == 'success' && needs.build-switch.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Determine release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            if ! echo "$version" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
              echo "Error: version '$version' does not match expected format v<major>.<minor>.<patch>"
              exit 1
            fi
            echo "name=$version" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download PC artifact
        uses: actions/download-artifact@v4
        with:
          name: cold_start-pc
          path: release-assets/pc

      - name: Download Windows artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: cold_start-windows
          path: release-assets/windows

      - name: Download Switch artifact
        uses: actions/download-artifact@v4
        with:
          name: cold_start-switch
          path: release-assets/switch

      - name: Package PC build
        run: |
          cd release-assets/pc
          chmod +x cold_start
          zip ../../cold_start-linux-${{ steps.version.outputs.name }}.zip cold_start

      - name: Package Windows build
        if: needs.build-windows.result == 'success'
        run: |
          cd release-assets/windows
          zip -r ../../cold_start-windows-${{ steps.version.outputs.name }}.zip .

      - name: Rename Switch build
        run: cp release-assets/switch/cold-start-nx.nro cold-start-nx.nro

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.name }}
          make_latest: true
          name: COLD START ${{ steps.version.outputs.name }}
          body: |
            See [README.md](README.md#changelog) for the full changelog.
          fail_on_unmatched_files: false
          files: |
            cold_start-linux-${{ steps.version.outputs.name }}.zip
            cold_start-windows-${{ steps.version.outputs.name }}.zip
            cold-start-nx.nro
